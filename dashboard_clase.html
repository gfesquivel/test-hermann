<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Resultados de la Clase</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0C2D5E;color:#fff;min-height:100vh;padding:2rem}
h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:.4rem}
.subtitle{text-align:center;font-size:15px;color:#7AACCC;margin-bottom:2.5rem}
.total-badge{text-align:center;margin-bottom:2.5rem}
.total-badge .num{font-size:64px;font-weight:700;line-height:1}
.total-badge .lbl{font-size:14px;color:#7AACCC;margin-top:.2rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;max-width:800px;margin:0 auto 2.5rem}
.profile-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:1.5rem;text-align:center}
.profile-card .count{font-size:56px;font-weight:700;line-height:1;margin-bottom:.3rem}
.profile-card .name{font-size:16px;font-weight:600;margin-bottom:.2rem}
.profile-card .pct{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:1rem}
.profile-card .bar-bg{height:8px;background:rgba(255,255,255,.12);border-radius:4px;overflow:hidden}
.profile-card .bar-fill{height:100%;border-radius:4px;transition:width .8s ease}
.c-A .count{color:#64B5F6} .c-A .name{color:#B3D9FF} .c-A .bar-fill{background:#378ADD}
.c-B .count{color:#81C784} .c-B .name{color:#C8E6C9} .c-B .bar-fill{background:#639922}
.c-C .count{color:#EF9A9A} .c-C .name{color:#FFCDD2} .c-C .bar-fill{background:#E53935}
.c-D .count{color:#FFE082} .c-D .name{color:#FFF9C4} .c-D .bar-fill{background:#F5A623}
.participants{max-width:800px;margin:0 auto}
.p-title{font-size:13px;font-weight:600;color:#7AACCC;letter-spacing:.06em;text-transform:uppercase;margin-bottom:1rem}
.p-list{display:flex;flex-wrap:wrap;gap:8px}
.p-chip{font-size:13px;padding:5px 12px;border-radius:20px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;gap:6px}
.p-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-A{background:#378ADD} .dot-B{background:#639922} .dot-C{background:#E53935} .dot-D{background:#F5A623}
.status{text-align:center;font-size:13px;color:#7AACCC;margin-top:2rem}
.pulse{display:inline-block;width:8px;height:8px;border-radius:50%;background:#4CAF50;margin-right:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
</style>
</head>
<body>
<h1>Test de Hermann · Resultados en vivo</h1>
<p class="subtitle">Ingeniería Comercial · 5° año · U. de los Andes</p>
<div class="total-badge">
  <div class="num" id="total">—</div>
  <div class="lbl">personas han contestado</div>
</div>
<div class="grid">
  <div class="profile-card c-A">
    <div class="count" id="cntA">0</div>
    <div class="name">Analítico</div>
    <div class="pct" id="pctA">0%</div>
    <div class="bar-bg"><div class="bar-fill" id="barA" style="width:0%"></div></div>
  </div>
  <div class="profile-card c-D">
    <div class="count" id="cntD">0</div>
    <div class="name">Estratega</div>
    <div class="pct" id="pctD">0%</div>
    <div class="bar-bg"><div class="bar-fill" id="barD" style="width:0%"></div></div>
  </div>
  <div class="profile-card c-B">
    <div class="count" id="cntB">0</div>
    <div class="name">Organizador</div>
    <div class="pct" id="pctB">0%</div>
    <div class="bar-bg"><div class="bar-fill" id="barB" style="width:0%"></div></div>
  </div>
  <div class="profile-card c-C">
    <div class="count" id="cntC">0</div>
    <div class="name">Relacional</div>
    <div class="pct" id="pctC">0%</div>
    <div class="bar-bg"><div class="bar-fill" id="barC" style="width:0%"></div></div>
  </div>
</div>
<div class="participants">
  <div class="p-title">Participantes</div>
  <div class="p-list" id="plist"><span style="color:rgba(255,255,255,.3);font-size:13px">Esperando respuestas...</span></div>
</div>
<div class="status"><span class="pulse"></span>Actualizando cada 10 segundos</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwizlarLhom_exe2JPrPiW0m3CLW8GCLnhUIClixAIe3zD2ZBpQu5zw4UzPFOUzATug/exec';
const PROXY = 'https://api.allorigins.win/get?url=' + encodeURIComponent(SCRIPT_URL);

function update() {
  fetch(PROXY + '&t=' + Date.now())
    .then(r => r.json())
    .then(wrapper => {
      const d = JSON.parse(wrapper.contents);
      const t = d.total || 0;
      document.getElementById('total').textContent = t;
      ['A','B','C','D'].forEach(k => {
        const c = d.counts[k] || 0;
        const p = t > 0 ? Math.round((c / t) * 100) : 0;
        document.getElementById('cnt' + k).textContent = c;
        document.getElementById('pct' + k).textContent = p + '%';
        document.getElementById('bar' + k).style.width = p + '%';
      });
      const list = document.getElementById('plist');
      if (d.participantes && d.participantes.length > 0) {
        list.innerHTML = d.participantes.map(p =>
          '<div class="p-chip"><div class="p-dot dot-' + p.perfil + '"></div>' + p.nombre + '</div>'
        ).join('');
      }
    })
    .catch(() => {});
}

update();
setInterval(update, 10000);
</script>
</body>
</html>
